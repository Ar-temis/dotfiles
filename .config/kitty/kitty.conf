include ~/.config/omarchy/current/theme/kitty.conf

# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# Window
window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0

# tab_bar_style       custom
tab_separator       ""
tab_title_template  "{index} \uE0B1 {title} "
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left
tab_title_max_length 40
tab_bar_min_tabs 2
#
# Allow remote access
allow_remote_control yes


# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

disable_ligatures cursor
font_size 14
cursor_trail 2
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9    

# Open new tab in the same working directory
map ctrl+shift+t new_tab_with_cwd
map cmd+t        new_tab_with_cwd

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard
# Send Shift+Enter as CSI-u so TUIs can distinguish it from Enter.
map shift+enter send_text all \e[13;2u
# Kitty legacy encoding sends Alt+Shift+Enter the same as Alt+Enter; send CSI-u so tmux can match M-S-Enter.
map alt+shift+enter send_text all \e[13;4u


window_padding_width 6
# window_margin_width 0

window_logo_alpha 0.1
window_logo_scale 20

# draw_minimal_borders                    yes
hide_window_decorations titlebar-and-corners

# background_opacity 0.7
# background_blur 1
# dynamic_background_opacity yes

map backspace send_text all \x7f

